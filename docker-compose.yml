services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_items
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stock_items
      SECRET_KEY: dev-secret-change-me
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
